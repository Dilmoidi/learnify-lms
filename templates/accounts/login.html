<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Learnify LMS</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #0e0c1a;
            --bg-card: rgba(28, 24, 54, 0.6);
            --border-default: #26215c;
            --border-strong: #3c3489;
            --text-primary: #eeedfe;
            --text-secondary: #cecbf6;
            --purple-main: #534ab7;
            --purple-accent: #7f77dd;
            --purple-soft: #afa9ec;
            --pink-main: #ed93b1;
            --teal-main: #5dcaa5;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glowing Background Elements */
        .ambient-glow-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(83, 74, 183, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            left: -100px;
            z-index: 0;
        }
        .ambient-glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(93, 202, 165, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px;
            right: -100px;
            z-index: 0;
        }

        .auth-container {
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 15px;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-default);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            padding: 40px;
            transition: border-color 0.3s ease;
        }
        .glass-card:hover {
            border-color: var(--border-strong);
        }

        .brand-logo {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .brand-logo span {
            background: linear-gradient(135deg, var(--purple-accent), var(--teal-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-control {
            background-color: #13102a;
            border: 1px solid var(--border-default);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background-color: #1c1836;
            border-color: var(--purple-accent);
            box-shadow: 0 0 10px rgba(83, 74, 183, 0.35);
            color: var(--text-primary);
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--purple-main), var(--purple-accent));
            border: none;
            color: var(--text-primary);
            font-weight: 500;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(83, 74, 183, 0.3);
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-premium:hover {
            background: linear-gradient(135deg, var(--purple-accent), var(--purple-soft));
            color: var(--bg-page);
            box-shadow: 0 6px 20px rgba(127, 119, 221, 0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>
    
    <div class="auth-container">
        <div class="glass-card">
            <h1 class="brand-logo">
                <i class="bi bi-rocket-takeoff text-purple-accent" style="color: var(--purple-accent);"></i>
                <span>Learnify</span>
            </h1>
            
            <h4 class="text-center mb-4 text-white">Welcome Back</h4>
            
            <!-- Messages alert -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'error' %}alert-danger bg-danger-subtle text-danger border-danger-subtle{% else %}alert-success bg-success-subtle text-success border-success-subtle{% endif %} alert-dismissible fade show" role="alert" style="font-size: 0.9rem;">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'accounts:login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label text-secondary">Username</label>
                    <input type="text" name="username" id="id_username" class="form-control" required placeholder="Enter your username">
                </div>
                <div class="mb-4">
                    <label for="id_password" class="form-label text-secondary">Password</label>
                    <input type="password" name="password" id="id_password" class="form-control" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-premium mb-3">Sign In</button>
            </form>
            
            <div class="text-center mt-3">
                <span class="text-secondary" style="font-size: 0.9rem;">Don't have an account?</span>
                <a href="{% url 'accounts:register' %}" class="fw-bold ms-1" style="color: var(--purple-soft); font-size: 0.9rem;">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
